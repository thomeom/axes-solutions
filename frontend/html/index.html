<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title data-i18n="page.index.title"></title>
  <meta name="description" data-i18n-content="page.index.description" content="" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
 
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div id="header-slot"></div>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-grid">

          <div class="fade-in">
            <span class="hero-eyebrow" data-i18n="hero.eyebrow"></span>

            <h1>
              <span data-i18n="hero.title.1"></span>
              <span class="accent" data-i18n="hero.title.accent"></span><br/>
              <span data-i18n="hero.title.2"></span>
            </h1>

            <p class="lead" data-i18n="hero.lead"></p>

            <div class="hero-cta">
              <a href="../html/requests.html" class="btn btn-primary" data-i18n="hero.cta.primary"></a>
              <a href="../html/services.html" class="btn btn-ghost" data-i18n="hero.cta.secondary"></a>
            </div>
          </div>

          <aside class="hero-card fade-in delay-2">
            <div class="metric">
              <span class="metric-label" data-i18n="hero.metric.clients"></span>
              <span class="metric-value">120+ <span class="up">↑ 18%</span></span>
            </div>

            <div class="metric">
              <span class="metric-label" data-i18n="hero.metric.projects"></span>
              <span class="metric-value">540</span>
            </div>

            <div class="metric">
              <span class="metric-label" data-i18n="hero.metric.specialists"></span>
              <span class="metric-value">85</span>
            </div>

            <div class="metric">
              <span class="metric-label" data-i18n="hero.metric.experience"></span>
              <span class="metric-value">7</span>
            </div>
          </aside>

        </div>
      </div>
    </section>

    <section>
      <div class="container">

          <div class="section-head fade-in">
            <h2 data-i18n="services.title"></h2>
            <p data-i18n="services.lead"></p>
          </div>
          
          <div class="services-grid">
          
            <a class="service-card fade-in" href="service-hr.html">
              <div class="service-icon">👥</div>
              <h3 data-i18n="services.hr.title"></h3>
              <p data-i18n="services.hr.desc"></p>
              <span class="service-link" data-i18n="services.link.more"></span>
            </a>
          
            <a class="service-card fade-in delay-1" href="service-it.html">
              <div class="service-icon">💻</div>
              <h3 data-i18n="services.it.title"></h3>
              <p data-i18n="services.it.desc"></p>
              <span class="service-link" data-i18n="services.link.more"></span>
            </a>
          
            <a class="service-card fade-in delay-2" href="service-accounting.html">
              <div class="service-icon">📊</div>
              <h3 data-i18n="services.acc.title"></h3>
              <p data-i18n="services.acc.desc"></p>
              <span class="service-link" data-i18n="services.link.more"></span>
            </a>
          
            <a class="service-card fade-in delay-3" href="service-legal.html">
              <div class="service-icon">⚖️</div>
              <h3 data-i18n="services.legal.title"></h3>
              <p data-i18n="services.legal.desc"></p>
              <span class="service-link" data-i18n="services.link.more"></span>
            </a>
          
          </div>
      </div>
    </section>

  </main>

  <div id="footer-slot"></div>

  
  <script src="../js/i18n.js"></script>
  <script src="../js/partials.js"></script>
  <script src="../js/app.js"></script>

  <script>
    window.mountLayout();
  </script>

</body>
</html>
