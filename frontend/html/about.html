<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title data-i18n="page.about.title"></title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <div id="header-slot"></div>

  <main class="page about-page">
    <div class="container">

      <div class="about-hero fade-in">
        <div>
          <span class="hero-eyebrow" data-i18n="about.hero.badge"></span>
          <h1 data-i18n="about.hero.title"></h1>
          <p data-i18n="about.hero.lead"></p>
        </div>
        <div class="about-hero__stats">
          <div>
            <strong>120+</strong>
            <span data-i18n="about.stats.clients"></span>
          </div>
          <div>
            <strong>4</strong>
            <span data-i18n="about.stats.services"></span>
          </div>
          <div>
            <strong>12k+</strong>
            <span data-i18n="about.stats.hours"></span>
          </div>
          <div>
            <strong>2h</strong>
            <span data-i18n="about.stats.response"></span>
          </div>
        </div>
      </div>

      <section class="about-mission-grid fade-in delay-1">
        <article>
          <span>01</span>
          <h2 data-i18n="about.mission.title"></h2>
          <p data-i18n="about.mission.text"></p>
        </article>
        <article>
          <span>02</span>
          <h2 data-i18n="about.goal.title"></h2>
          <p data-i18n="about.goal.text"></p>
        </article>
      </section>

      <section class="about-section fade-in delay-2">
        <div class="section-head">
          <h2 data-i18n="about.advantages.title"></h2>
          <p data-i18n="about.advantages.lead"></p>
        </div>
        <div class="about-card-grid">
          <article class="about-card">
            <span class="about-card__icon">01</span>
            <h3 data-i18n="about.advantage.1.title"></h3>
            <p data-i18n="about.advantage.1.text"></p>
          </article>
          <article class="about-card">
            <span class="about-card__icon">02</span>
            <h3 data-i18n="about.advantage.2.title"></h3>
            <p data-i18n="about.advantage.2.text"></p>
          </article>
          <article class="about-card">
            <span class="about-card__icon">03</span>
            <h3 data-i18n="about.advantage.3.title"></h3>
            <p data-i18n="about.advantage.3.text"></p>
          </article>
          <article class="about-card">
            <span class="about-card__icon">04</span>
            <h3 data-i18n="about.advantage.4.title"></h3>
            <p data-i18n="about.advantage.4.text"></p>
          </article>
        </div>
      </section>

      <section class="about-section fade-in delay-3">
        <div class="section-head">
          <h2 data-i18n="about.workflow.title"></h2>
          <p data-i18n="about.workflow.lead"></p>
        </div>
        <div class="about-workflow">
          <article>
            <span>1</span>
            <h3 data-i18n="about.workflow.1.title"></h3>
            <p data-i18n="about.workflow.1.text"></p>
          </article>
          <article>
            <span>2</span>
            <h3 data-i18n="about.workflow.2.title"></h3>
            <p data-i18n="about.workflow.2.text"></p>
          </article>
          <article>
            <span>3</span>
            <h3 data-i18n="about.workflow.3.title"></h3>
            <p data-i18n="about.workflow.3.text"></p>
          </article>
          <article>
            <span>4</span>
            <h3 data-i18n="about.workflow.4.title"></h3>
            <p data-i18n="about.workflow.4.text"></p>
          </article>
        </div>
      </section>

      <section class="about-section about-split fade-in delay-3">
        <div>
          <div class="section-head align-left">
            <h2 data-i18n="about.team.title"></h2>
            <p data-i18n="about.team.lead"></p>
          </div>
          <div class="about-team-grid">
            <article>
              <strong data-i18n="about.team.1.role"></strong>
              <span data-i18n="about.team.1.text"></span>
            </article>
            <article>
              <strong data-i18n="about.team.2.role"></strong>
              <span data-i18n="about.team.2.text"></span>
            </article>
            <article>
              <strong data-i18n="about.team.3.role"></strong>
              <span data-i18n="about.team.3.text"></span>
            </article>
            <article>
              <strong data-i18n="about.team.4.role"></strong>
              <span data-i18n="about.team.4.text"></span>
            </article>
          </div>
        </div>

        <div class="about-tech">
          <h2 data-i18n="about.tech.title"></h2>
          <p data-i18n="about.tech.lead"></p>
          <div class="about-tech__tags">
            <span data-i18n="about.tech.crm"></span>
            <span data-i18n="about.tech.analytics"></span>
            <span data-i18n="about.tech.documents"></span>
            <span data-i18n="about.tech.automation"></span>
            <span data-i18n="about.tech.security"></span>
            <span data-i18n="about.tech.integration"></span>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-slot"></div>

 
  <script src="../js/i18n.js"></script>
  <script src="../js/partials.js"></script>
  <script src="../js/app.js"></script>

  <script>
    window.mountLayout();
  </script>

</body>
</html>
